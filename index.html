<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3a86c8">
  <title>Lo de Gilda — Almacén</title>
  <link rel="stylesheet" href="css/styles.css?v=5">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
</head>
<body>

  <!-- ===================== PORTÓN DE ENTRADA ===================== -->
  <div id="loginGate" class="login-gate">
    <div class="login-card">
      <div class="login-logo">🏪</div>
      <h1>Lo de Gilda</h1>
      <p>Ingresá la contraseña para entrar</p>
      <form id="loginForm" autocomplete="off">
        <input id="loginPass" type="password" placeholder="Contraseña" aria-label="Contraseña">
        <button type="submit" class="btn btn-primary btn-big">Entrar</button>
      </form>
      <p id="loginError" class="login-error" hidden>Contraseña incorrecta</p>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">🏪 <span>Lo de Gilda</span></div>
    <div class="day-pill" id="dayPill">—</div>
  </header>

  <!-- ===================== VENDER ===================== -->
  <main id="view-vender" class="view active">
    <section class="scan-box">
      <form id="scanForm" autocomplete="off">
        <input id="scanInput" type="text" inputmode="text" placeholder="Escaneá o escribí el código / nombre…" aria-label="Código o nombre">
        <button type="submit" class="btn btn-primary" id="scanBtn">Buscar</button>
      </form>
      <div class="scan-actions">
        <button class="btn btn-ghost" id="cameraBtn" hidden>📷 Escanear con cámara</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </section>

    <section class="cart">
      <div class="cart-head">
        <h2>Venta actual</h2>
        <button class="btn btn-link" id="clearCartBtn" hidden>Vaciar</button>
      </div>
      <div id="cartItems" class="cart-items">
        <p class="empty">Todavía no agregaste productos.</p>
      </div>
      <div class="cart-foot" id="cartFoot" hidden>
        <div class="cart-total">
          <span>Total</span>
          <strong id="cartTotal">$0</strong>
        </div>
        <button class="btn btn-success btn-big" id="checkoutBtn">Cobrar</button>
      </div>
    </section>
  </main>

  <!-- ===================== STOCK ===================== -->
  <main id="view-stock" class="view">
    <section class="stock-head">
      <input id="stockSearch" type="text" placeholder="Buscar o escanear código…" aria-label="Buscar en stock">
      <button class="btn btn-ghost" id="stockScanBtn" hidden title="Escanear con cámara">📷</button>
      <button class="btn btn-primary" id="newProductBtn">+ Nuevo</button>
    </section>
    <div id="stockAlerts" class="alerts"></div>
    <div id="stockList" class="stock-list"></div>
  </main>

  <!-- ===================== DÍA ===================== -->
  <main id="view-dia" class="view">
    <section class="day-picker">
      <button class="day-nav" id="dayPrev" aria-label="Día anterior">‹</button>
      <input type="date" id="dayDate" aria-label="Elegir día">
      <button class="day-nav" id="dayNext" aria-label="Día siguiente">›</button>
    </section>
    <section class="day-summary">
      <div class="kpi kpi-main">
        <span class="kpi-label" id="kpiLabel">Vendido hoy</span>
        <strong class="kpi-value" id="kpiTotal">$0</strong>
      </div>
      <div class="kpi-row">
        <div class="kpi">
          <span class="kpi-label">Ventas</span>
          <strong class="kpi-value" id="kpiCount">0</strong>
        </div>
        <div class="kpi">
          <span class="kpi-label">Ganancia</span>
          <strong class="kpi-value" id="kpiProfit">$0</strong>
        </div>
      </div>
    </section>
    <div class="day-history-head">
      <h2>Movimientos</h2>
    </div>
    <div id="dayHistory" class="day-history"></div>
    <button class="btn btn-link" id="logoutBtn">🔒 Salir / bloquear</button>
  </main>

  <!-- ===================== NAV ===================== -->
  <nav class="tabbar">
    <button class="tab active" data-view="vender">🛒<span>Vender</span></button>
    <button class="tab" data-view="stock">📦<span>Stock</span></button>
    <button class="tab" data-view="dia">📊<span>Día</span></button>
  </nav>

  <!-- ===================== CÁMARA (compartida) ===================== -->
  <div id="cameraOverlay" class="camera-overlay" hidden>
    <div class="camera-panel">
      <p class="camera-title" id="cameraTitle">Apuntá al código de barras</p>
      <div id="reader"></div>
      <button class="btn btn-ghost" id="cameraCloseBtn">Cerrar cámara</button>
    </div>
  </div>

  <!-- ===================== MODAL PRODUCTO ===================== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <h2 id="modalTitle">Nuevo producto</h2>
      <p id="modalHint" class="modal-hint"></p>
      <form id="productForm">
        <label>Código de barras
          <input id="pCode" type="text" autocomplete="off">
        </label>
        <label>Nombre *
          <input id="pName" type="text" required autocomplete="off">
        </label>
        <label>Marca
          <input id="pBrand" type="text" autocomplete="off">
        </label>
        <label>Se vende por
          <select id="pUnit">
            <option value="un">Unidad (por bulto/paquete)</option>
            <option value="kg">Peso (por kg — fiambres, etc.)</option>
          </select>
        </label>
        <div class="form-row">
          <label>Costo $
            <input id="pCost" type="number" min="0" step="0.01" inputmode="decimal" placeholder="opcional">
          </label>
          <label>Margen %
            <input id="pMargin" type="number" min="0" step="1" inputmode="numeric" placeholder="ej: 30">
          </label>
        </div>
        <label><span id="lblPrice">Precio de venta</span> *
          <input id="pPrice" type="number" min="0" step="0.01" inputmode="decimal" required>
        </label>
        <div class="form-row">
          <label><span id="lblStock">Stock</span>
            <input id="pStock" type="number" min="0" step="1" inputmode="decimal" value="0">
          </label>
          <label>Avisar cuando ≤
            <input id="pMin" type="number" min="0" step="1" inputmode="decimal" value="3">
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modalCancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="modalSave">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <!-- Cámara (se carga sólo si hay internet; en PC no hace falta) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
  <!-- Base de datos en la nube (Supabase) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=5"></script>
  <script src="js/db.js?v=5"></script>
  <script src="js/api.js?v=5"></script>
  <script src="js/app.js?v=5"></script>
</body>
</html>
